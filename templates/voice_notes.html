<!DOCTYPE html>
<html>
<head>
  <title>Medical Voice Notes</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    textarea, input {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      font-size: 16px;
    }
    .status {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>🎤 Patient Notes (Voice Enabled)</h2>

<input type="text" placeholder="Patient Name..." />
<textarea rows="8" placeholder="Treatment notes..."></textarea>

<div class="status" id="status">Status: Initializing...</div>

<script>
let recognition;
let isActive = false;
let AUTO_RESUME_WINDOW = 5000; // 5 sec grace
let lastStoppedTime = 0;

// 🎯 Insert at cursor
function insertAtCursor(text) {
  const active = document.activeElement;

  if (active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA")) {
    const start = active.selectionStart;
    const end = active.selectionEnd;

    const value = active.value;

    active.value = value.substring(0, start) + text + value.substring(end);

    active.selectionStart = active.selectionEnd = start + text.length;
  }
}

// 🧠 Clean text
function cleanText(text) {
  text = text.toLowerCase().trim();

  // Remove repeated words
  text = text.replace(/\b(\w+)( \1\b)+/g, '$1');

  // Merge spelled letters: i n f o → info
  text = text.replace(/\b([a-z](?:\s[a-z]){2,})\b/g, (match) => {
    return match.replace(/\s/g, '');
  });

  // 🎤 Voice commands
  text = text.replace(/full\s?stop/g, '.');
  text = text.replace(/start new line/g, '.\n');
  text = text.replace(/\bcomma\b/g, ', '); // ✅ NEW

  // Custom dictionary
  const dictionary = {
    "info soc": "infosoft",
    "info stock": "infosoft",
    "infosoc": "infosoft"
  };

  Object.keys(dictionary).forEach(key => {
    text = text.replaceAll(key, dictionary[key]);
  });

  // 🧠 Capitalize sentences
  text = text.replace(/(^\w)|(\.\s*\w)|(\n\s*\w)/g, (c) => {
    return c.toUpperCase();
  });

  return text + " ";
}

// 🎤 Process speech
function processSpeech(transcript) {
  transcript = transcript.toLowerCase().trim();

  // ✅ Start trigger
  if (/^start note\b/.test(transcript)) {
    isActive = true;
    updateStatus("🎤 Listening...");

    transcript = transcript.replace(/^start note\b/, "").trim();

    if (transcript) {
      insertAtCursor(cleanText(transcript));
    }
    return;
  }

  // 🛑 Stop trigger
  if (/stop note\b/.test(transcript)) {
    stopListening("🛑 Stopped by voice");
    return;
  }

  // 🚫 Ignore if not active
  if (!isActive) return;

  // ✍️ Insert text
  insertAtCursor(cleanText(transcript));
}

// 🛑 Stop listening
function stopListening(message) {
  isActive = false;
  lastStoppedTime = Date.now();
  updateStatus(message || "⏸️ Auto-stopped (silence)");
}

// 📢 Status update
function updateStatus(msg) {
  document.getElementById("status").innerText = "Status: " + msg;
}

// 🚀 Start recognition
function startRecognition() {
  if (!('webkitSpeechRecognition' in window)) {
    alert("Speech Recognition not supported in this browser");
    return;
  }

  recognition = new webkitSpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.lang = "en-IN";

  recognition.onstart = () => {
    updateStatus("Ready (Say 'Start Note')");
  };

  recognition.onresult = (event) => {

    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        let transcript = event.results[i][0].transcript;
        console.log("Heard:", transcript);
        processSpeech(transcript);
      }
    }
  };

  recognition.onerror = (event) => {
    console.error("Error:", event.error);
    updateStatus("Error: " + event.error);
  };

  recognition.onend = () => {
    // 🔄 Safe restart
    try {
      recognition.start();
    } catch (e) {
      console.log("Restart prevented");
    }
  };

  recognition.start();
}



// Start automatically
startRecognition();
</script>

</body>
</html>
