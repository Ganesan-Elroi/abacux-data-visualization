<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charts in Bootstrap Modal</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    
    <style>
        .chart-modal-container {
            height: 400px;
            width: 100%;
        }
        
        .modal-chart-item {
            margin-bottom: 30px;
        }
        
        /* Full screen modal */
        .modal-fullscreen-custom {
            max-width: 95%;
            height: 90vh;
        }
        
        .modal-fullscreen-custom .modal-body {
            max-height: calc(90vh - 120px);
            overflow-y: auto;
        }
        
        /* Tab styling */
        .nav-tabs .nav-link {
            color: #495057;
        }
        
        .nav-tabs .nav-link.active {
            color: #0d6efd;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">📊 Charts in Bootstrap Modal Examples</h1>
        
        <!-- Trigger Buttons -->
        <div class="row mb-4">
            <div class="col-md-12">
                <h5>Choose Your Preferred Modal Style:</h5>
                <button class="btn btn-primary me-2" onclick="showModalStyle1()">
                    Style 1: Vertical Scroll Modal
                </button>
                <button class="btn btn-success me-2" onclick="showModalStyle2()">
                    Style 2: Tabbed Modal
                </button>
                <button class="btn btn-info me-2" onclick="showModalStyle3()">
                    Style 3: Large Fullscreen Modal
                </button>
                <button class="btn btn-warning" onclick="showModalStyle4()">
                    Style 4: Grid Layout Modal
                </button>
            </div>
        </div>
        
        <!-- Sample Data Display -->
        <div class="card">
            <div class="card-header">
                <h5>Test Data</h5>
            </div>
            <div class="card-body">
                <textarea id="dbResultInput" class="form-control" rows="8" readonly></textarea>
            </div>
        </div>
    </div>

    <!-- ========================================================================
         STYLE 1: VERTICAL SCROLL MODAL (All charts stacked vertically)
    ======================================================================== -->
    <div class="modal fade" id="chartModal1" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">📊 Chart Analysis Results</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="chartContainer1"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="downloadCharts()">
                        <i class="bi bi-download"></i> Download Charts
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ========================================================================
         STYLE 2: TABBED MODAL (Each chart in a separate tab)
    ======================================================================== -->
    <div class="modal fade" id="chartModal2" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">📊 Chart Analysis Results</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <!-- Nav Tabs -->
                    <ul class="nav nav-tabs mb-3" id="chartTabs" role="tablist"></ul>
                    
                    <!-- Tab Content -->
                    <div class="tab-content" id="chartTabContent"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ========================================================================
         STYLE 3: FULLSCREEN MODAL (Large, almost fullscreen)
    ======================================================================== -->
    <div class="modal fade" id="chartModal3" tabindex="-1">
        <div class="modal-dialog modal-fullscreen-custom">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">📊 Chart Analysis Dashboard</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="chartContainer3"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ========================================================================
         STYLE 4: GRID LAYOUT MODAL (2 columns responsive grid)
    ======================================================================== -->
    <div class="modal fade" id="chartModal4" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">📊 Chart Analysis Results</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row" id="chartContainer4"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/bootstrap.bundle.min.js"></script>

    <script>
        // Sample data
        const sampleData = [
            {
                "customer_type": "Premium",
                "count": 45,
                "revenue": 125000,
                "avg_order_value": 2777,
                "satisfaction": 4.5
            },
            {
                "customer_type": "Standard",
                "count": 120,
                "revenue": 180000,
                "avg_order_value": 1500,
                "satisfaction": 4.0
            },
            {
                "customer_type": "Basic",
                "count": 200,
                "revenue": 100000,
                "avg_order_value": 500,
                "satisfaction": 3.5
            }
        ];

        // Load sample data on page load
        $(document).ready(function() {
            $('#dbResultInput').val(JSON.stringify(sampleData, null, 2));
        });

        // ====================================================================
        // MAIN FUNCTION: Load Charts and Show Modal
        // ====================================================================
        
        function loadChartsInModal(modalId, containerId, layoutStyle) {
            // Parse data
            const dbResults = sampleData;
            
            // Call API
            $.ajax({
                url: 'http://localhost:5012/api/analyze-charts',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    db_result: dbResults,
                    user_prompt: 'Show customer distribution and revenue analysis'
                }),
                success: function(response) {
                    if (response.status === 1 && response.chart_data.length > 0) {
                        // Render charts based on layout style
                        if (layoutStyle === 'vertical') {
                            renderChartsVertical(containerId, response.chart_data, dbResults);
                        } else if (layoutStyle === 'tabbed') {
                            renderChartsTabs(response.chart_data, dbResults);
                        } else if (layoutStyle === 'fullscreen') {
                            renderChartsFullscreen(containerId, response.chart_data, dbResults);
                        } else if (layoutStyle === 'grid') {
                            renderChartsGrid(containerId, response.chart_data, dbResults);
                        }
                        
                        // Show modal
                        const modal = new bootstrap.Modal(document.getElementById(modalId));
                        modal.show();
                        
                        // Resize charts after modal is shown
                        setTimeout(() => {
                            resizeAllCharts();
                        }, 300);
                    } else {
                        alert('Failed to generate charts: ' + response.msg);
                    }
                },
                error: function(xhr, status, error) {
                    alert('API Error: ' + error);
                }
            });
        }

        // ====================================================================
        // STYLE 1: VERTICAL SCROLL
        // ====================================================================
        
        function showModalStyle1() {
            loadChartsInModal('chartModal1', 'chartContainer1', 'vertical');
        }

        function renderChartsVertical(containerId, chartConfigs, dbResults) {
            const container = $('#' + containerId);
            container.empty();
            
            chartConfigs.forEach((config, index) => {
                const chartDiv = $(`
                    <div class="modal-chart-item">
                        <div class="card">
                            <div class="card-header bg-primary text-white">
                                <h6 class="mb-0">${getChartTitle(config)}</h6>
                            </div>
                            <div class="card-body">
                                <div id="chart-${index}" class="chart-modal-container"></div>
                            </div>
                        </div>
                    </div>
                `);
                
                container.append(chartDiv);
                
                setTimeout(() => {
                    const chartData = transformToChartData(
                        config.label_key,
                        config.value_keys,
                        dbResults
                    );
                    renderChartByType(config.chart_type, `chart-${index}`, chartData);
                }, 100 * (index + 1));
            });
        }

        // ====================================================================
        // STYLE 2: TABBED
        // ====================================================================
        
        function showModalStyle2() {
            loadChartsInModal('chartModal2', null, 'tabbed');
        }

        function renderChartsTabs(chartConfigs, dbResults) {
            const tabNav = $('#chartTabs');
            const tabContent = $('#chartTabContent');
            
            tabNav.empty();
            tabContent.empty();
            
            chartConfigs.forEach((config, index) => {
                const tabId = `tab-${index}`;
                const isActive = index === 0 ? 'active' : '';
                
                // Create tab button
                const tabButton = $(`
                    <li class="nav-item" role="presentation">
                        <button class="nav-link ${isActive}" 
                                id="${tabId}-tab" 
                                data-bs-toggle="tab" 
                                data-bs-target="#${tabId}" 
                                type="button">
                            Chart ${index + 1}: ${config.chart_type.toUpperCase()}
                        </button>
                    </li>
                `);
                
                // Create tab pane
                const tabPane = $(`
                    <div class="tab-pane fade ${isActive ? 'show active' : ''}" 
                         id="${tabId}" 
                         role="tabpanel">
                        <h5 class="mb-3">${getChartTitle(config)}</h5>
                        <div id="chart-tab-${index}" class="chart-modal-container"></div>
                    </div>
                `);
                
                tabNav.append(tabButton);
                tabContent.append(tabPane);
                
                setTimeout(() => {
                    const chartData = transformToChartData(
                        config.label_key,
                        config.value_keys,
                        dbResults
                    );
                    renderChartByType(config.chart_type, `chart-tab-${index}`, chartData);
                }, 100 * (index + 1));
            });
        }

        // ====================================================================
        // STYLE 3: FULLSCREEN
        // ====================================================================
        
        function showModalStyle3() {
            loadChartsInModal('chartModal3', 'chartContainer3', 'fullscreen');
        }

        function renderChartsFullscreen(containerId, chartConfigs, dbResults) {
            const container = $('#' + containerId);
            container.empty();
            
            const row = $('<div class="row"></div>');
            container.append(row);
            
            chartConfigs.forEach((config, index) => {
                const colSize = chartConfigs.length === 1 ? '12' : '6';
                const chartDiv = $(`
                    <div class="col-md-${colSize} mb-4">
                        <div class="card h-100">
                            <div class="card-header bg-dark text-white">
                                <h6 class="mb-0">${getChartTitle(config)}</h6>
                            </div>
                            <div class="card-body">
                                <div id="chart-fs-${index}" style="height: 450px;"></div>
                            </div>
                        </div>
                    </div>
                `);
                
                row.append(chartDiv);
                
                setTimeout(() => {
                    const chartData = transformToChartData(
                        config.label_key,
                        config.value_keys,
                        dbResults
                    );
                    renderChartByType(config.chart_type, `chart-fs-${index}`, chartData);
                }, 100 * (index + 1));
            });
        }

        // ====================================================================
        // STYLE 4: GRID LAYOUT
        // ====================================================================
        
        function showModalStyle4() {
            loadChartsInModal('chartModal4', 'chartContainer4', 'grid');
        }

        function renderChartsGrid(containerId, chartConfigs, dbResults) {
            const container = $('#' + containerId);
            container.empty();
            
            chartConfigs.forEach((config, index) => {
                const colSize = chartConfigs.length === 1 ? '12' : (chartConfigs.length === 2 ? '6' : '4');
                const chartDiv = $(`
                    <div class="col-md-${colSize} mb-3">
                        <div class="card">
                            <div class="card-header bg-info text-white">
                                <small>${config.chart_type.toUpperCase()}</small>
                            </div>
                            <div class="card-body p-2">
                                <div id="chart-grid-${index}" style="height: 300px;"></div>
                            </div>
                        </div>
                    </div>
                `);
                
                container.append(chartDiv);
                
                setTimeout(() => {
                    const chartData = transformToChartData(
                        config.label_key,
                        config.value_keys,
                        dbResults
                    );
                    renderChartByType(config.chart_type, `chart-grid-${index}`, chartData);
                }, 100 * (index + 1));
            });
        }

        // ====================================================================
        // DATA TRANSFORMATION
        // ====================================================================
        
        function transformToChartData(labelKey, valueKeys, fullDbResults) {
            const labels = [];
            const aggregated = {};
            
            fullDbResults.forEach(row => {
                const label = String(row[labelKey] || 'Unknown');
                
                if (!aggregated[label]) {
                    aggregated[label] = {};
                    valueKeys.forEach(vk => {
                        aggregated[label][vk] = 0;
                    });
                    labels.push(label);
                }
                
                valueKeys.forEach(vk => {
                    const value = parseFloat(row[vk]) || 0;
                    aggregated[label][vk] += value;
                });
            });
            
            const datasets = valueKeys.map(vk => {
                return {
                    label: formatColumnName(vk),
                    values: labels.map(label => aggregated[label][vk])
                };
            });
            
            return { labels, datasets };
        }

        // ====================================================================
        // CHART RENDERING
        // ====================================================================
        
        function renderChartByType(chartType, containerId, chartData) {
            switch(chartType) {
                case 'bar_v':
                    renderBarVerticalChart(containerId, chartData);
                    break;
                case 'bar_h':
                    renderBarHorizontalChart(containerId, chartData);
                    break;
                case 'donut':
                    renderDonutChart(containerId, chartData);
                    break;
                case 'line':
                    renderLineChart(containerId, chartData);
                    break;
                case 'scatter':
                    renderScatterChart(containerId, chartData);
                    break;
                case 'area':
                    renderAreaChart(containerId, chartData);
                    break;
                case 'bar_clickable':
                    renderBarClickableChart(containerId, chartData);
                    break;
                default:
                    renderBarVerticalChart(containerId, chartData);
            }
        }

        // Simple chart implementations (add your full implementations)
        function renderBarVerticalChart(containerId, chartData) {
            const myChart = echarts.init(document.getElementById(containerId));
            myChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: chartData.labels },
                yAxis: { type: 'value' },
                series: chartData.datasets.map(ds => ({
                    name: ds.label,
                    type: 'bar',
                    data: ds.values
                }))
            });
        }

        function renderBarHorizontalChart(containerId, chartData) {
            const myChart = echarts.init(document.getElementById(containerId));
            myChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'value' },
                yAxis: { type: 'category', data: chartData.labels },
                series: chartData.datasets.map(ds => ({
                    name: ds.label,
                    type: 'bar',
                    data: ds.values
                }))
            });
        }

        function renderDonutChart(containerId, chartData) {
            const myChart = echarts.init(document.getElementById(containerId));
            const pieData = chartData.labels.map((label, index) => ({
                name: label,
                value: chartData.datasets[0].values[index]
            }));
            
            myChart.setOption({
                tooltip: { trigger: 'item' },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    data: pieData
                }]
            });
        }

        function renderLineChart(containerId, chartData) {
            const myChart = echarts.init(document.getElementById(containerId));
            myChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: chartData.labels },
                yAxis: { type: 'value' },
                series: chartData.datasets.map(ds => ({
                    name: ds.label,
                    type: 'line',
                    smooth: true,
                    data: ds.values
                }))
            });
        }

        function renderScatterChart(containerId, chartData) {
            const myChart = echarts.init(document.getElementById(containerId));
            const scatterData = chartData.labels.map((label, i) => [
                chartData.datasets[0].values[i],
                chartData.datasets[1].values[i]
            ]);
            
            myChart.setOption({
                tooltip: { trigger: 'item' },
                xAxis: { type: 'value' },
                yAxis: { type: 'value' },
                series: [{
                    type: 'scatter',
                    data: scatterData,
                    symbolSize: 20
                }]
            });
        }

        function renderAreaChart(containerId, chartData) {
            const myChart = echarts.init(document.getElementById(containerId));
            myChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', boundaryGap: false, data: chartData.labels },
                yAxis: { type: 'value' },
                series: chartData.datasets.map(ds => ({
                    name: ds.label,
                    type: 'line',
                    smooth: true,
                    areaStyle: {},
                    data: ds.values
                }))
            });
        }

        function renderBarClickableChart(containerId, chartData) {
            renderBarVerticalChart(containerId, chartData);
        }

        // ====================================================================
        // UTILITIES
        // ====================================================================
        
        function formatColumnName(columnName) {
            return columnName
                .replace(/_/g, ' ')
                .replace(/\b\w/g, l => l.toUpperCase());
        }

        function getChartTitle(config) {
            const valueLabel = config.value_keys.map(formatColumnName).join(' & ');
            const labelFormatted = formatColumnName(config.label_key);
            return `${valueLabel} by ${labelFormatted}`;
        }

        function resizeAllCharts() {
            // Resize all ECharts instances
            echarts.getInstanceByDom(document.getElementById('chart-0'))?.resize();
            // Add more as needed
        }

        function downloadCharts() {
            alert('Download functionality would be implemented here');
        }

        // Listen for modal shown event to resize charts
        $('.modal').on('shown.bs.modal', function () {
            resizeAllCharts();
        });
    </script>
</body>
</html>
