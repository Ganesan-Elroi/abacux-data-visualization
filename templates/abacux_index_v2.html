<!DOCTYPE html>
<html>

<head>

<title>Abacux AI Chart</title>

<script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js"></script>
<script src="{{ url_for('static', filename='js/bar_chart_vertical.js') }}"></script>
<script src="{{ url_for('static', filename='js/bar_chart_horizontal.js') }}"></script>
<script src="{{ url_for('static', filename='js/line_chart.js') }}"></script>
<script src="{{ url_for('static', filename='js/donut_chart.js') }}"></script>
<script src="{{ url_for('static', filename='js/candlestick_chart.js') }}"></script>
<script src="{{ url_for('static', filename='js/bar_chart_axis_break.js') }}"></script>
<script src="{{ url_for('static', filename='js/bar_chart_clickable.js') }}"></script>

<style>

body{
font-family:Arial;
background:#f4f7f6;
margin: 0;
padding: 0;
}

.page-wrapper {
    display: flex;
    flex-direction: row;
    min-height: 100vh;
}

.sidebar {
    width: 250px;
    background: #fff;
    border-right: 1px solid #ccc;
    padding: 20px;
    box-shadow: 2px 0 5px rgba(0,0,0,0.05);
}

.main-content {
    flex: 1;
    padding: 20px;
    text-align: center;
}

.container{
    width:100%;
    max-width: 900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
    color: #333;
}

.checkbox-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 400px;
    overflow-y: auto;
    border: 1px solid #ccc;
    padding: 10px;
    background: #fafafa;
    border-radius: 4px;
}

.checkbox-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
}

textarea {
    width: 100%;
    box-sizing: border-box;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-family: inherit;
    resize: vertical;
}

.submit-btn {
    width: 100%;
    padding: 12px;
    background: #4e79a7;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
}
.submit-btn:hover {
    background: #3e6085;
}
</style>

</head>

<body>

<div class="page-wrapper">
    <div class="sidebar">
        <form method="GET" action="/">
            <div class="form-group">
                <label>Select Data Columns</label>
                <div class="checkbox-list">
                    {% for col in all_columns %}
                    <div class="checkbox-item">
                        <input type="checkbox" id="col_{{ loop.index }}" name="columns" value="{{ col }}" {% if col in selected_columns %}checked{% endif %}>
                        <label for="col_{{ loop.index }}">{{ col }}</label>
                    </div>
                    {% endfor %}
                </div>
            </div>
            
            <div class="form-group">
                <label>Custom Prompt (Optional)</label>
                <textarea name="user_prompt" rows="4" placeholder="e.g. 'Show me a line chart of sales over time'">{{ user_prompt }}</textarea>
            </div>
            
            <button type="submit" class="submit-btn">Generate Charts</button>
        </form>
    </div>

    <div class="main-content">
        <div class="container" id="charts-container">
            <h2>Abacux Sales Charts</h2>
        </div>
    </div>
</div>

<script>

const chartsList = {{ charts_list | safe }};
const container = document.getElementById("charts-container");

chartsList.forEach((chartData, index) => {
    // create wrapper div with controlled height for charts
    let wrapper = document.createElement("div");
    wrapper.style.marginTop = "40px";
    wrapper.style.paddingTop = "20px";
    wrapper.style.position = "relative";
    wrapper.style.height = "400px";
    wrapper.style.width = "100%";
    if (index > 0) {
        wrapper.style.borderTop = "1px solid #ccc";
    }
    
    // create title
    let title = document.createElement("h3");
    let chartDisplayName = chartData.chart_type.toUpperCase();
    let valueKeysText = chartData.value_keys.join(" & ");
    title.innerText = `Chart ${index + 1}: ${chartData.label_key} vs ${valueKeysText} (${chartDisplayName})`;
    wrapper.appendChild(title);

    // create container
    let canvas = document.createElement("div");
    canvas.id = `chart_${index}`;
    canvas.style.width = "100%";
    canvas.style.height = "100%";
    wrapper.appendChild(canvas);
    container.appendChild(wrapper);

    // Sort chronologically if label_key is invoice_date
    if (chartData.label_key === "invoice_date" && chartData.data) {
        chartData.data.sort((a, b) => new Date(a.invoice_date) - new Date(b.invoice_date));
    }

    // render chart using static js functions
    if (chartData.chart_type === "donut") {
        renderDonutChart(canvas.id, chartData);
    } else if (chartData.chart_type === "line") {
        renderLineChart(canvas.id, chartData);
    } else if (chartData.chart_type === "bar_h") {
        renderBarHorizontalChart(canvas.id, chartData);
    } else if (chartData.chart_type === "candlestick") {
        renderCandlestickChart(canvas.id, chartData);
    } else if (chartData.chart_type === "bar_axis_break") {
        renderBarChartAxisBreak(canvas.id, chartData);
    } else if (chartData.chart_type === "bar_clickable") {
        renderBarChartClickable(canvas.id, chartData);
    } else {
        renderBarVerticalChart(canvas.id, chartData);
    }
});

</script>


</body>
</html>
